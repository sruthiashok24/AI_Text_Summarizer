<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Summarizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 700px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
            color: #7c3aed;
        }
        p.subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 16px;
            color: #e2e8f0;
            font-size: 14px;
            resize: none;
            outline: none;
        }
        textarea:focus { border-color: #7c3aed; }

        /* Issue 1 — summarize button */
        button#summarizeBtn {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        button#summarizeBtn:hover:not(:disabled) { background: #6d28d9; }
        button#summarizeBtn:disabled {
            background: #4c1d95;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Issue 1 — spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Issue 1 — loader text */
        .loader {
            text-align: center;
            margin-top: 16px;
            display: none;
            color: #a78bfa;
            font-size: 14px;
        }

        /* Result box */
        .result {
            margin-top: 24px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 16px;
            display: none;
        }

        /* ── ISSUE 5 FIX: result header holds title + copy button side by side ── */
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .result-header h3 { color: #7c3aed; }

        /* ── ISSUE 5 FIX: copy button styling ── */
        .copy-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: #1e293b;
            color: #a78bfa;
            border: 1px solid #4c1d95;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .copy-btn:hover { background: #2d1f63; border-color: #7c3aed; color: #fff; }

        /* ── ISSUE 5 FIX: "Copied!" confirmation state ── */
        .copy-btn.copied {
            background: #14532d;
            border-color: #166534;
            color: #86efac;
            cursor: default;
        }

        .result p { line-height: 1.7; color: #cbd5e1; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Text Summarizer</h1>
        <p class="subtitle">Paste any long text and get a concise summary instantly</p>

        <textarea id="inputText" placeholder="Paste your long text here..."></textarea>

        <button id="summarizeBtn" onclick="summarize()">
            <div class="spinner" id="spinner"></div>
            <span id="btnLabel">✨ Summarize</span>
        </button>

        <div class="loader" id="loader">Analyzing your text, please wait…</div>

        <div class="result" id="result">

            <!-- ── ISSUE 5 FIX: header row with Copy button next to title ── -->
            <div class="result-header">
                <h3>📝 Summary</h3>
                <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">
                    <span id="copyIcon">📋</span>
                    <span id="copyLabel">Copy</span>
                </button>
            </div>

            <p id="summaryText"></p>
        </div>
    </div>

    <script>
        async function summarize() {
            const text = document.getElementById('inputText').value.trim();
            if (!text) { alert('Please enter some text!'); return; }

            const btn         = document.getElementById('summarizeBtn');
            const spinner     = document.getElementById('spinner');
            const btnLabel    = document.getElementById('btnLabel');
            const loader      = document.getElementById('loader');
            const result      = document.getElementById('result');
            const summaryText = document.getElementById('summaryText');

            // Issue 1 — loading state
            btn.disabled          = true;
            spinner.style.display = 'block';
            btnLabel.textContent  = 'Summarizing…';
            loader.style.display  = 'block';
            result.style.display  = 'none';

            // ── ISSUE 5 FIX: reset copy button whenever a new summary is fetched ──
            resetCopyBtn();

            try {
                const response = await fetch('/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await response.json();
                summaryText.textContent = data.summary;
                result.style.display = 'block';
            } catch (error) {
                alert('Error! Please try again.');
            } finally {
                // Issue 1 — restore button
                btn.disabled          = false;
                spinner.style.display = 'none';
                btnLabel.textContent  = '✨ Summarize';
                loader.style.display  = 'none';
            }
        }

        // ── ISSUE 5 FIX: copy summary text to clipboard ──
        function copyToClipboard() {
            const text    = document.getElementById('summaryText').textContent;
            const copyBtn = document.getElementById('copyBtn');

            // Modern clipboard API
            navigator.clipboard.writeText(text).then(() => {
                showCopied();
            }).catch(() => {
                // Fallback for older browsers / non-HTTPS
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity  = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showCopied();
            });
        }

        // ── ISSUE 5 FIX: show "Copied!" confirmation for 2 seconds ──
        function showCopied() {
            const copyBtn   = document.getElementById('copyBtn');
            const copyIcon  = document.getElementById('copyIcon');
            const copyLabel = document.getElementById('copyLabel');

            copyBtn.classList.add('copied');
            copyBtn.disabled    = true;
            copyIcon.textContent  = '✅';
            copyLabel.textContent = 'Copied!';

            setTimeout(resetCopyBtn, 2000);
        }

        // ── ISSUE 5 FIX: reset copy button back to default state ──
        function resetCopyBtn() {
            const copyBtn   = document.getElementById('copyBtn');
            const copyIcon  = document.getElementById('copyIcon');
            const copyLabel = document.getElementById('copyLabel');

            copyBtn.classList.remove('copied');
            copyBtn.disabled      = false;
            copyIcon.textContent  = '📋';
            copyLabel.textContent = 'Copy';
        }
    </script>
</body>
</html>
